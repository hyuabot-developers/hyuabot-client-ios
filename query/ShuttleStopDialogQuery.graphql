query ShuttleStopDialogQuery ($stopID: String!, $period: [String!]!) {
    shuttle (input: {
        stops: [{ name: $stopID, limit: { order: null, destination: null } }],
        periods: $period,
        weekdays: [true, false]
    }) {
        stops {
            latitude
            longitude
            timetable {
                destination {
                    destination
                    entries {
                        time
                        weekday
                        route {
                            tag
                        }
                    }
                }
            }
        }
    }
}
