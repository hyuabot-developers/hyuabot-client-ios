query ShuttleTransferWidgetQuery($after: LocalTime, $weekday: String!, $logDates: [Date!]) {
    shuttle(input: {
        stops: [
            { name: "dormitory_o", limit: { order: 0, destination: 8 } },
            { name: "shuttlecock_o", limit: { order: 0, destination: 8 } },
            { name: "station", limit: { order: 0, destination: 8 } },
            { name: "terminal", limit: { order: 0, destination: 8 } },
            { name: "jungang_stn", limit: { order: 0, destination: 8 } },
            { name: "shuttlecock_i", limit: { order: 0, destination: 8 } }
        ],
        after: $after
    }) {
        stops {
            latitude
            longitude
            name
            timetable {
                destination {
                    destination
                    entries { time }
                }
            }
        }
    }
    subway(input: { keys: [
        { stationID: "K449", direction: ["up", "down"], weekdays: [$weekday], limit: 1 },
        { stationID: "K251", direction: ["up", "down"], weekdays: [$weekday], limit: 1 }
    ]}) {
        stationID
        arrival {
            direction
            entries {
                minutes
                terminal { stationID name }
            }
        }
    }
    transferBus: bus(input: [
        { route: 216000075, stop: 216000759, limit: 2, dates: $logDates },
        { route: 216000075, stop: 216000117, limit: 2, dates: $logDates }
    ]) {
        route { seq name }
        stop { seq }
        arrival { minutes stops }
        log { date time }
    }
}
