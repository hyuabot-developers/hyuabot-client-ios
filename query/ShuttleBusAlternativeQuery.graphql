query ShuttleBusAlternativeQuery {
    bus(input: [
        { route: 216000068, stop: 216000383, limit: 1 },
        { route: 216000068, stop: 216000379, limit: 1 },
        { route: 216000068, stop: 216000138, limit: 1 },
        { route: 216000081, stop: 216000028, limit: 1 },
        { route: 216000101, stop: 216000028, limit: 1 },
        { route: 216000016, stop: 216000152, limit: 1 },
        { route: 216000082, stop: 216000077, limit: 1 },
        { route: 216000102, stop: 216000077, limit: 1 },
        { route: 216000016, stop: 216000074, limit: 1 },
        { route: 216000082, stop: 217000140, limit: 1 },
        { route: 216000102, stop: 217000140, limit: 1 },
        { route: 216000016, stop: 217000264, limit: 1 },
    ]) {
        route { seq }
        stop { seq name latitude longitude }
        arrival { stops seats minutes lowFloor isRealtime time }
