query BusRealtimePageQuery($language: String!) {
    notices(input: {language: $language, category: "버스"}) {
        notices {
            title
            url
            expiredAt
        }
    },
    bus (
        input: [
            { route: 216000068, stop: 216000138, limit: 3 },
            { route: 216000068, stop: 216000383, limit: 3 },
            { route: 216000068, stop: 216000381, limit: 3 },
            { route: 216000068, stop: 216000379, limit: 3 },
            { route: 216000061, stop: 216000383, limit: 3 },
            { route: 216000061, stop: 216000381, limit: 3 },
            { route: 216000061, stop: 216000379, limit: 3 },
            { route: 216000043, stop: 216000719, limit: 3 },
            { route: 216000026, stop: 216000719, limit: 3 },
            { route: 216000096, stop: 216000719, limit: 3 },
            { route: 216000104, stop: 216000070, limit: 3 },
            { route: 200000015, stop: 216000070, limit: 3 },
            { route: 216000075, stop: 216000759, limit: 3 },
            { route: 216000075, stop: 213000487, limit: 3 },
            { route: 216000016, stop: 216000152, limit: 3 },
        ]
    ) {
        route { seq, name }
        stop { seq }
        order
        arrival {
            stops
            seats
            minutes
            lowFloor
            isRealtime
            time
        }
    }
}
