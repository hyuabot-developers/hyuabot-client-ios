query HomePageQuery(
    $after: LocalTime
    $date: Date!
    $campusID: Int!
    $busInput: [BusRouteStopInput!]!
) {
    shuttle(input: {
        stops: [
            { name: "dormitory_o", limit: { destination: 8 } },
            { name: "shuttlecock_o", limit: { destination: 8 } },
            { name: "station", limit: { destination: 8 } },
            { name: "terminal", limit: { destination: 8 } },
            { name: "jungang_stn", limit: { destination: 8 } },
            { name: "shuttlecock_i", limit: { destination: 8 } },
        ],
        after: $after
    }) {
        stops {
            name
            timetable {
                destination {
                    destination
                    entries {
                        route {
                            tag
                            name
                        }
                        time
                        stops {
                            stop
                            time
                        }
                    }
                }
            }
        }
    }
    transferBus: bus(input: [
        { route: 216000075, stop: 216000759, limit: 2 }
    ]) {
        stop {
            seq
        }
        arrival {
            minutes
        }
    }
    bus(input: $busInput) {
        route {
            seq
        }
        stop {
            seq
        }
        arrival {
            minutes
        }
    }
    cafeteria(input: { date: $date, campus: $campusID }) {
        seq
        runningTime {
            breakfast
            lunch
            dinner
        }
        menus {
            type
            food
            price
        }
    }
}
