query HomePageQuery(
    $language: String!
    $after: LocalTime
    $weekday: String!
    $date: Date!
    $campusID: Int!
    $busInput: [BusRouteStopInput!]!
) {
    homeWeather {
        issuedAt
        expiresAt
        observedAt
        forecastUpdatedAt
        currentTemperature
        currentPrecipitationType
        currentPrecipitationAmount
        minimumTemperature
        maximumTemperature
        precipitationProbabilityMax
        precipitationStartAt
        precipitationEndAt
        precipitationType
        precipitationConfidence
        availableModelCount
        agreeingModelCount
        primaryCondition
        attribution
    }
    notices(input: { language: $language, category: "셔틀" }) {
        notices {
            title
            url
            expiredAt
        }
    }
    shuttle(input: {
        stops: [
            { name: "dormitory_o", limit: { destination: 100 } },
            { name: "shuttlecock_o", limit: { destination: 100 } },
            { name: "station", limit: { destination: 100 } },
            { name: "terminal", limit: { destination: 100 } },
            { name: "jungang_stn", limit: { destination: 100 } },
            { name: "shuttlecock_i", limit: { destination: 100 } },
        ],
        after: $after
    }) {
        stops {
            name
            timetable {
                destination {
                    destination
                    entries {
                        seq
                        route {
                            tag
                            name
                        }
                        time
                        stops {
                            stop
                            time
                        }
                    }
                }
            }
        }
    }
    transferBus: bus(input: [
        { route: 216000075, stop: 216000759, limit: 2 }
    ]) {
        stop {
            seq
        }
        arrival {
            minutes
            stops
            isRealtime
        }
    }
    subway(input: { keys: [
        { stationID: "K449", direction: ["up", "down"], weekdays: [$weekday], limit: 12 },
        { stationID: "K251", direction: ["up", "down"], weekdays: [$weekday], limit: 12 },
        { stationID: "K258", direction: ["down"], weekdays: [$weekday], limit: 12 },
        { stationID: "S26", direction: ["up"], weekdays: [$weekday] }
    ]}) {
        stationID
        arrival {
            direction
            entries {
                minutes
                isRealtime
                location
                stops
                status
                terminal {
                    stationID
                    name
                }
            }
        }
        timetable {
            weekday
            direction
            time
            terminal {
                stationID
                name
            }
        }
    }
    bus(input: $busInput) {
        route {
            seq
        }
        stop {
            seq
        }
        arrival {
            minutes
        }
    }
    cafeteria(input: { date: $date, campus: $campusID }) {
        seq
        runningTime {
            breakfast
            lunch
            dinner
        }
        menus {
            type
            food
            price
        }
    }
}
