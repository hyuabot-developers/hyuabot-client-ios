query ShuttleRealtimePageWatchQuery (
    $stops: [ShuttleStopInput!]!,
    $after: LocalTime,
) {
    shuttle(input: {
        stops: $stops,
        after: $after
    }) {
        stops {
            latitude
            longitude
            name
            timetable {
                destination {
                    destination
                    entries {
                        route {
                            tag
                            name
                        }
                        time
                        stops {
                            stop
                            time
                        }
                    }
                }
            }
        }
    }
}
